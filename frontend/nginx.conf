server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Taille max d'upload (5 Mo côté backend)
    client_max_body_size 10m;

    # Compression gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;
    gzip_min_length 256;

    # Proxy fichiers uploadés (AVANT le cache statique pour éviter les conflits)
    location /uploads/ {
        proxy_pass http://app:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy API → backend (port 3000)
    location ~ ^/(auth|messages|conversations|users|upload|notifications|groups|swagger-ui|api-docs|health) {
        proxy_pass http://app:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy WebSocket
    location /ws {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    # Cache des assets statiques (uniquement les fichiers locaux du frontend)
    location ~* \.(js|css|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — toutes les routes non-API renvoient vers index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
