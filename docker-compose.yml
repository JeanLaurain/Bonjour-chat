services:
  mongodb:
    image: mongo:7
    container_name: bonjour-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: bonjour
      MONGO_INITDB_ROOT_PASSWORD: bonjour_password
      MONGO_INITDB_DATABASE: bonjour
    volumes:
      - ./data/mongodb:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet -u bonjour -p bonjour_password --authenticationDatabase admin
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: bonjour-app:latest
    container_name: bonjour-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "mongodb://bonjour:bonjour_password@mongodb:27017/bonjour?authSource=admin"
      JWT_SECRET: "super-secret-jwt-key-change-in-production"
      RUST_LOG: "info"
      ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
      VAPID_PUBLIC_KEY: "BLBz4aYxKwMNoEh7cd_rivGR_jm9MxiS3RkQiSrJofkfHAFf8VSjW-kFnjjbbptk__eGFLm3TWFHV5lzc01c8Yg"
      VAPID_PRIVATE_KEY_FILE: "/app/vapid_private.pem"
    volumes:
      - ./uploads:/app/uploads
      - ./vapid_private.pem:/app/vapid_private.pem:ro
    depends_on:
      mongodb:
        condition: service_healthy

  frontend:
    image: bonjour-frontend:latest
    container_name: bonjour-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - app
